<!DOCTYPE html>
<html>
<head>
    <style>
        /* FIX: Lock body dimensions strictly to viewport to stop scrolling/cutting off */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center; justify-content: center;
            background: #000; color: white;
            user-select: none;
            padding-top: 40px; box-sizing: border-box; 
        }

        /* --- Custom Title Bar --- */
        .title-bar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            padding: 0 15px; box-sizing: border-box;
            /* FIX: Prevents blur layers from overlapping and hiding the bar */
            transform: translateZ(0);
            will-change: transform;
            isolation: isolate;
        }
        .drag-region {
            flex-grow: 1; height: 100%;
            -webkit-app-region: drag;
            display: flex; align-items: center;
            font-size: 0.75rem; opacity: 0.5; font-weight: 600; letter-spacing: 1px;
        }
        .window-controls { display: flex; gap: 15px; -webkit-app-region: no-drag; }
        .window-controls button {
            background: none; border: none; color: white; opacity: 0.5;
            cursor: pointer; font-size: 1.1rem; padding: 0; transition: opacity 0.2s;
        }
        .window-controls button:hover { opacity: 1; transform: scale(1.1); }

        #bg-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(60px) brightness(0.25);
            transform: scale(1.1); z-index: -1; transition: opacity 1.2s ease-in-out;
            will-change: opacity;
        }

        #player-card {
            position: relative; margin-top: 10px;
            /* FIX: Use responsive width to guarantee it never hits the edges */
            width: 88%; max-width: 340px; 
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 48px; padding: 30px; box-sizing: border-box;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; overflow-y: auto; 
            max-height: calc(100vh - 60px); 
            transition: border-color 0.8s ease;
        }
        
        #player-card::-webkit-scrollbar { display: none; }

        /* Blobs */
        .blob-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 65%; z-index: 0; pointer-events: none; filter: blur(50px); opacity: 0.7; }
        .blob { position: absolute; border-radius: 50%; transition: background 1.5s ease; }
        .blob-1 { width: 180px; height: 180px; top: 10%; left: -20%; animation: roam-1 5s infinite alternate ease-in-out; }
        .blob-2 { width: 140px; height: 140px; bottom: 0; right: -10%; animation: roam-2 4s infinite alternate ease-in-out; }
        .blob-3 { width: 120px; height: 120px; bottom: 10%; left: 20%; animation: roam-3 6s infinite alternate ease-in-out; }

        @keyframes roam-1 { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(120px, 40px) scale(1.3); } 100% { transform: translate(60px, -80px) scale(0.9); } }
        @keyframes roam-2 { 0% { transform: translate(0, 0) scale(1.1); } 50% { transform: translate(-100px, -60px) scale(0.8); } 100% { transform: translate(-40px, 20px) scale(1.2); } }
        @keyframes roam-3 { 0% { transform: translate(0, 0) scale(0.9); } 50% { transform: translate(50px, -100px) scale(1.2); } 100% { transform: translate(-80px, -40px) scale(1); } }

        .content-wrap { position: relative; z-index: 2; display: flex; flex-direction: column;}

        .art-wrapper {
            position: relative; width: 100%; aspect-ratio: 1; border-radius: 32px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: #111;
            overflow: hidden; transition: transform 0.4s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; 
        }
        
        #art { width: 100%; height: 100%; object-fit: cover; display: none; }
        #app-logo { position: absolute; bottom: 12px; right: 12px; width: 26px; height: 26px; background-size: contain; background-repeat: no-repeat; }

        .info-section { margin-top: 30px; display: flex; flex-direction: column; text-align: center; }
        #title { font-size: 1.45rem; font-weight: 700; margin-bottom: 4px; }
        #artist { font-size: 1.05rem; opacity: 0.6; }

        #refresh-btn {
            display: none; margin-top: 15px; padding: 10px 20px;
            background: #1DB954; color: black; font-weight: bold; border-radius: 20px;
            border: none; cursor: pointer; transition: 0.2s; align-self: center;
        }
        #refresh-btn:hover { background: #1ed760; transform: scale(1.05); }

        .progress-container { margin-top: 25px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.15); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: #fff; margin-top: -5px; }

        .times { display: flex; justify-content: space-between; font-size: 0.75rem; opacity: 0.5; margin-top: 10px; }

        .controls { margin-top: 28px; display: flex; justify-content: space-between; align-items: center; }
        button { background: none; border: none; color: white; cursor: pointer; transition: all 0.2s; opacity: 0.85; }
        button:hover { transform: scale(1.15); opacity: 1; }
        
        #play-pause { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; width: 64px; height: 64px;
            display: flex; align-items: center; justify-content: center; 
        }

        .sec-btn { opacity: 0.4; }
        .sec-btn.active { opacity: 1; color: #1DB954; }

        .volume-container { display: flex; align-items: center; gap: 12px; margin-top: 25px; opacity: 0.4; transition: opacity 0.3s; }
        .volume-container:hover { opacity: 0.9; }

        /* --- SYNCED LYRICS CSS --- */
        #lyrics-toggle {
            margin-top: 20px; font-size: 0.75rem; font-weight: bold;
            color: rgba(255,255,255,0.6); align-self: center; transition: 0.2s; cursor: pointer;
        }
        #lyrics-toggle:hover { color: white; }
        #lyrics-container {
            display: none; max-height: 120px; overflow-y: auto;
            font-size: 0.95rem; margin-top: 15px; white-space: pre-wrap; 
            text-align: center; opacity: 0.9; line-height: 1.6;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        #lyrics-container::-webkit-scrollbar { width: 0px; }
        
        .lyric-line { transition: all 0.3s ease; opacity: 0.4; padding: 4px 10px; }
        .lyric-line.active-lyric { opacity: 1; font-weight: bold; color: #1DB954; transform: scale(1.05); }

        /* --- Device Selector --- */
        .device-selector-wrap { position: relative; margin-top: 20px; }
        .device-toggle { 
            display: flex; align-items: center; gap: 8px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
            color: #1DB954; opacity: 1;
        }
        .device-toggle:hover { color: #808080; }
        .device-toggle:active { color: #404040; }
        
        .device-list {
            display: none; position: absolute; bottom: 100%; left: 0; width: 100%;
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 10px; box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;
            max-height: 150px; overflow-y: auto; z-index: 10;
        }
        .device-item { padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; color: #1DB954; }
        .device-item:hover { background: rgba(255,255,255,0.1); color: #808080;}
        .device-item:active { color: #404040; }
        .device-item.active { font-weight: bold; }
        
        .device-list::-webkit-scrollbar { width: 5px; }
        .device-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="title-bar">
        <div class="drag-region pywebview-drag-region">LIQUID GLASS</div>
        <div class="window-controls">
            <button onclick="pywebview.api.minimize_window()">—</button>
            <button onclick="pywebview.api.toggle_maximize()">□</button>
            <button onclick="pywebview.api.close_window()">✕</button>
        </div>
    </div>

    <img id="bg-blur" src="">
    
    <div id="player-card">
        <div class="blob-container">
            <div class="blob blob-1" id="b1"></div>
            <div class="blob blob-2" id="b2"></div>
            <div class="blob blob-3" id="b3"></div>
        </div>

        <div class="content-wrap">
            <div class="art-wrapper">
                <img id="art" src="">
                <div id="app-logo"></div>
            </div>
            
            <div class="info-section">
                <div id="title">Waiting...</div>
                <div id="artist">Connect Spotify</div>
                <button id="refresh-btn" onclick="refreshApp()">Wake Up / Connect</button>
            </div>

            <div class="progress-container">
                <input type="range" id="progress-bar" min="0" value="0" onchange="seekAudio(this.value)" oninput="isDragging = true">
                <div class="times">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="sec-btn" id="btn-shuffle" onclick="toggleShuffle()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                </button>
                <button onclick="skip(-1)"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button id="play-pause" onclick="toggle()"></button>
                <button onclick="skip(1)"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="sec-btn" id="btn-repeat" onclick="toggleRepeat()"></button>
            </div>

            <div class="volume-container">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg>
                <input type="range" id="volume-bar" min="0" max="100" oninput="changeVolume(this.value)">
            </div>

            <div id="lyrics-toggle" onclick="toggleLyricsView()">SHOW LYRICS</div>
            <div id="lyrics-container">Loading lyrics...</div>

            <div class="device-selector-wrap">
                <div class="device-list" id="device-list-ui"></div>
                <div class="device-toggle" onclick="toggleDeviceList()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                    <span id="active-device-name">No Device</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const spotifyLogo = "https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg";
        let isDragging = false;
        let deviceListOpen = false;
        
        let parsedLyrics = [];
        let currentLyricIndex = -1;

        const iconPlay = `<svg width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
        const iconPause = `<svg width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
        const iconRepeat = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>`;

        document.getElementById('play-pause').innerHTML = iconPlay;
        document.getElementById('btn-repeat').innerHTML = iconRepeat;
        document.getElementById('app-logo').style.backgroundImage = `url('${spotifyLogo}')`;

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            return `${Math.floor(totalSeconds / 60)}:${(totalSeconds % 60).toString().padStart(2, '0')}`;
        }

        function updateColors(c) {
            const rgb = `rgb(${c[0]},${c[1]},${c[2]})`;
            document.getElementById('b1').style.background = rgb;
            document.getElementById('b2').style.background = `rgba(${c[0]},${c[1]},${c[2]}, 0.8)`;
            document.getElementById('b3').style.background = `rgba(${c[0]},${c[1]},${c[2]}, 0.6)`;
            document.getElementById('player-card').style.borderColor = `rgba(${c[0]},${c[1]},${c[2]}, 0.35)`;
        }

        function setSystemState(state) {
            if (state === 'offline') {
                document.getElementById('title').innerText = "Spotify Offline";
                document.getElementById('artist').innerText = "App is disconnected";
                document.getElementById('bg-blur').style.opacity = "0.1";
                document.getElementById('art').style.display = "none";
                document.getElementById('refresh-btn').style.display = "inline-block";
                document.getElementById('active-device-name').innerText = "Disconnected";
                document.getElementById('lyrics-container').innerText = "";
            }
        }

        function updateLyrics(lyricsData) {
            const container = document.getElementById('lyrics-container');
            parsedLyrics = [];
            currentLyricIndex = -1;

            if (!lyricsData || lyricsData.includes("Error") || lyricsData === "No lyrics found for this track.") {
                container.innerHTML = `<div style="padding: 20px 0;">${lyricsData || "No lyrics found."}</div>`;
                return;
            }

            if (lyricsData.match(/\[\d{2}:\d{2}\.\d{2,3}\]/)) {
                const lines = lyricsData.split('\n');
                const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;
                let html = "<div style='height: 40px;'></div>";

                lines.forEach((line, index) => {
                    const match = regex.exec(line);
                    if (match) {
                        const m = parseInt(match[1], 10);
                        const s = parseInt(match[2], 10);
                        const ms = parseInt(match[3].padEnd(3, '0'), 10);
                        const timeMs = (m * 60 + s) * 1000 + ms;
                        const text = match[4].trim() || "♪";

                        parsedLyrics.push({ time: timeMs, text: text, id: `lyric-${index}` });
                        html += `<div class="lyric-line" id="lyric-${index}">${text}</div>`;
                    }
                });

                html += "<div style='height: 40px;'></div>";
                container.innerHTML = html || `<div style="padding: 20px 0;">Unable to parse lyrics.</div>`;
            } else {
                container.innerHTML = `<div style="padding: 20px 0;">${lyricsData.replace(/\n/g, '<br>')}</div>`;
            }
        }

        function syncLyrics(currentTimeMs) {
            if (parsedLyrics.length === 0) return;

            let activeIdx = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (currentTimeMs >= parsedLyrics[i].time) {
                    activeIdx = i;
                } else {
                    break;
                }
            }

            if (activeIdx !== currentLyricIndex && activeIdx !== -1) {
                if (currentLyricIndex !== -1) {
                    const oldEl = document.getElementById(parsedLyrics[currentLyricIndex].id);
                    if (oldEl) oldEl.classList.remove('active-lyric');
                }

                currentLyricIndex = activeIdx;
                
                const newEl = document.getElementById(parsedLyrics[currentLyricIndex].id);
                if (newEl) {
                    newEl.classList.add('active-lyric');
                    newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function toggleLyricsView() {
            const container = document.getElementById('lyrics-container');
            const toggleBtn = document.getElementById('lyrics-toggle');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
                toggleBtn.innerText = 'HIDE LYRICS';
            } else {
                container.style.display = 'none';
                toggleBtn.innerText = 'SHOW LYRICS';
            }
        }

        function updateUI(data) {
            if (data.devices) {
                document.getElementById('active-device-name').innerText = data.active_device;
                let html = "";
                data.devices.forEach(d => {
                    let activeClass = d.is_active ? 'active' : '';
                    html += `<div class="device-item ${activeClass}" onclick="selectDevice('${d.id}')">${d.name}</div>`;
                });
                document.getElementById('device-list-ui').innerHTML = html;
            }

            if (data.status === "success" || data.status === "no_track") {
                document.getElementById('refresh-btn').style.display = "none";
            }

            if (data.status === "success") {
                document.getElementById('title').innerText = data.title;
                document.getElementById('artist').innerText = data.artist;
                document.getElementById('art').style.display = "block";
                
                if (document.getElementById('art').src !== data.thumb) {
                    document.getElementById('art').src = data.thumb;
                    document.getElementById('bg-blur').src = data.thumb;
                    document.getElementById('bg-blur').style.opacity = "1";
                    document.getElementById('lyrics-container').innerHTML = `<div style="padding: 20px 0;">Loading lyrics...</div>`;
                }

                document.getElementById('play-pause').innerHTML = data.is_playing ? iconPause : iconPlay;
                document.getElementById('btn-shuffle').classList.toggle('active', data.shuffle);
                document.getElementById('btn-repeat').classList.toggle('active', data.repeat !== 'off');

                if (!isDragging) {
                    document.getElementById('progress-bar').max = data.length;
                    document.getElementById('progress-bar').value = data.time;
                    document.getElementById('time-current').innerText = formatTime(data.time);
                    document.getElementById('time-total').innerText = formatTime(data.length);
                    syncLyrics(data.time);
                }
                document.getElementById('volume-bar').value = data.volume;
            } else if (data.status === "no_track") {
                document.getElementById('title').innerText = "Ready";
                document.getElementById('artist').innerText = "Select a track to play";
                document.getElementById('art').style.display = "none";
                document.getElementById('lyrics-container').innerText = "";
            }
        }

        function toggleDeviceList() {
            deviceListOpen = !deviceListOpen;
            document.getElementById('device-list-ui').style.display = deviceListOpen ? 'block' : 'none';
        }

        function selectDevice(id) {
            pywebview.api.set_device(id);
            toggleDeviceList();
        }

        function refreshApp() { pywebview.api.ensure_active(); }
        function toggle() { pywebview.api.toggle_audio(); }
        function skip(dir) { pywebview.api.skip(dir); }
        function seekAudio(val) { isDragging = false; pywebview.api.set_time(val); }
        function changeVolume(val) { pywebview.api.set_volume(val); }
        function toggleShuffle() { pywebview.api.toggle_shuffle(); }
        function toggleRepeat() { pywebview.api.toggle_repeat(); }
    </script>
</body>
</html>
